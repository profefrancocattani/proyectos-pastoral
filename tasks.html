<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pastoral Projects - Tareas</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a78bfa",
                        "on-primary": "#0a0012",
                        "surface": "#0c0c0f",
                        "on-surface": "#fafafa",
                        "background": "#09090b",
                        "on-background": "#fafafa",
                        "surface-container": "#121215",
                        "surface-container-high": "#18181b",
                        "surface-container-highest": "#1e1e22",
                        "outline-variant": "#27272a",
                        "on-surface-variant": "#a1a1aa",
                        "tertiary": "#34d399",
                        "error": "#ef4444",
                        "primary-container": "#7c3aed"
                    },
                    fontFamily: {
                        "geist": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Geist', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .task-done { opacity: 0.6; filter: grayscale(0.5); }
        .task-done h3 { text-decoration: line-through; color: #a1a1aa; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col selection:bg-primary/30">

    <!-- Header -->
    <header class="bg-background fixed top-0 w-full z-50 border-b border-outline-variant flex items-center justify-between px-4 h-16">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary cursor-pointer">menu</span>
            <h1 class="font-geist tracking-tight text-on-surface text-xl font-bold">Pastoral Projects</h1>
        </div>
        <div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant">
            <img class="w-full h-full object-cover" alt="Avatar Lead" src="https://lh3.googleusercontent.com/aida-public/AB6AXuACsNxNUoEQpbTHoWvFtp2fd_p5M5a4rHC2Cx-EYUk_lR5sI-9MfFi9MqiiZUL2nQNAq4bBxHiVV3D1UUKGB38jhZKeVaXMP4-KxD0RuAE25pwPZeWy4AqGagFwf5zrI-FF9v_Rxt_lW7cYlJPieK2erWZh1zatNXi8-9UUCl3Rkbpu0DE1RunQziuFTPrC4DagNfAmv4Y5tOswDpWLbVEN6f07kGcKN-WH7NqC--Zz6oojYe1xtuIIepmOxYicqSiNHEyulhladtFl"/>
        </div>
    </header>

    <main class="flex-grow pt-20 pb-24 px-4 max-w-2xl mx-auto w-full">
        
        <!-- Dashboard de Progreso (Dinámico) -->
        <section class="mb-8">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-2xl font-bold tracking-tight text-on-surface">Tareas Activas</h2>
                    <p id="task-count-text" class="text-on-surface-variant text-sm">Cargando tareas...</p>
                </div>
                <div class="text-right">
                    <span id="percentage-text" class="text-tertiary font-bold text-lg">0%</span>
                    <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Completado</p>
                </div>
            </div>
            <div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-tertiary w-0 transition-all duration-500 rounded-full"></div>
            </div>
        </section>

        <!-- Formulario de Entrada Rápida -->
        <section class="mb-8 bg-surface-container border border-outline-variant rounded-xl p-4">
            <div class="flex flex-col gap-3">
                <input type="text" id="new-task-title" placeholder="¿Qué hay que hacer?" class="bg-background border-outline-variant rounded-lg text-on-surface focus:ring-primary focus:border-primary placeholder:text-on-surface-variant/50">
                <div class="flex gap-2">
                    <select id="new-task-priority" class="bg-background border-outline-variant rounded-lg text-sm text-on-surface-variant focus:ring-primary">
                        <option value="Alta">Alta Prioridad</option>
                        <option value="Operativo" selected>Operativo</option>
                        <option value="Outreach">Outreach</option>
                    </select>
                    <button onclick="addTask()" class="flex-grow bg-primary text-on-primary font-bold py-2 rounded-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">add</span>
                        Añadir Tarea
                    </button>
                </div>
            </div>
        </section>

        <!-- Contenedor de Tareas -->
        <div id="tasks-container" class="space-y-4">
            <!-- Las tareas se inyectan aquí con JS -->
        </div>

    </main>

    <!-- Barra de Navegación -->
    <nav class="bg-surface fixed bottom-0 w-full z-50 border-t border-outline-variant flex justify-around items-center h-16 pb-safe">
        <a class="flex flex-col items-center justify-center text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-geist text-[10px] font-medium">Dashboard</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary font-bold" href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assignment</span>
            <span class="font-geist text-[10px]">Tareas</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant" href="history.html">
            <span class="material-symbols-outlined">history</span>
            <span class="font-geist text-[10px] font-medium">Historial</span>
        </a>
    </nav>

    <script>
        // Estado inicial de las tareas (se carga de localStorage si existe)
        let tasks = JSON.parse(localStorage.getItem('pastoral-tasks')) || [
            { id: 1, title: "Coordinación de Misa Dominical", priority: "Alta", completed: true },
            { id: 2, title: "Reporte Financiero Mensual", priority: "Operativo", completed: false },
            { id: 3, title: "Inscripción Campamento Juvenil", priority: "Outreach", completed: false }
        ];

        function updateUI() {
            const container = document.getElementById('tasks-container');
            const percentageText = document.getElementById('percentage-text');
            const progressBar = document.getElementById('progress-bar');
            const countText = document.getElementById('task-count-text');

            // Limpiar contenedor
            container.innerHTML = '';

            // Calcular porcentajes
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            // Actualizar Dashboard
            percentageText.innerText = `${percentage}%`;
            progressBar.style.width = `${percentage}%`;
            countText.innerText = `${total - completed} tickets pendientes para esta semana`;

            // Renderizar tarjetas
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `bg-surface-container border border-outline-variant rounded-xl p-5 hover:bg-surface-container-high transition-colors ${task.completed ? 'task-done' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="bg-surface-container-highest text-on-surface-variant text-[10px] font-bold px-2 py-0.5 rounded border border-outline-variant uppercase tracking-wider">${task.priority}</span>
                        <div class="flex gap-2">
                            <button onclick="deleteTask(${task.id})" class="text-on-surface-variant hover:text-error transition-colors">
                                <span class="material-symbols-outlined text-xl">delete</span>
                            </button>
                            <button onclick="toggleTask(${task.id})" class="${task.completed ? 'text-tertiary' : 'text-on-surface-variant'} hover:text-tertiary transition-colors active:scale-90">
                                <span class="material-symbols-outlined text-2xl">${task.completed ? 'check_circle' : 'radio_button_unchecked'}</span>
                            </button>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-on-surface mb-1 leading-tight">${task.title}</h3>
                `;
                container.appendChild(card);
            });

            // Guardar en local para que no se pierda al recargar
            localStorage.setItem('pastoral-tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const titleInput = document.getElementById('new-task-title');
            const priorityInput = document.getElementById('new-task-priority');

            if (titleInput.value.trim() === "") return;

            const newTask = {
                id: Date.now(),
                title: titleInput.value,
                priority: priorityInput.value,
                completed: false
            };

            tasks.unshift(newTask); // Agregar al principio
            titleInput.value = ""; // Limpiar input
            updateUI();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            updateUI();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            updateUI();
        }

        // Inicializar
        updateUI();
    </script>
</body>
</html>
