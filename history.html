<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pastoral Projects - Historial</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a78bfa",
                        "on-primary": "#0a0012",
                        "surface": "#0c0c0f",
                        "on-surface": "#fafafa",
                        "background": "#09090b",
                        "on-background": "#fafafa",
                        "surface-container": "#121215",
                        "surface-container-high": "#18181b",
                        "surface-container-low": "#0f0f12",
                        "outline-variant": "#27272a",
                        "on-surface-variant": "#a1a1aa",
                        "tertiary": "#34d399",
                        "tertiary-container": "#065f46",
                        "primary-container": "#7c3aed"
                    },
                    fontFamily: {
                        "geist": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Geist', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        body { min-height: 100vh; }
        
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .loading-ai { animation: pulse-subtle 1.5s infinite; }
    </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary/30">

    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant flex items-center justify-between px-4 h-16">
        <div class="flex items-center gap-4">
            <button class="text-primary hover:bg-surface-container-high transition-colors p-2 rounded-lg active:scale-95 duration-150">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="text-xl font-bold text-on-surface font-geist tracking-tight">Pastoral Projects</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-on-surface-variant text-sm font-medium hidden md:block">Historial</span>
            <div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
                <img alt="Perfil" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnbiSDitG6z4xpBfeCxXGfpQBM9rSB2elKYDqI0diKnOfNdxDkNJl9En1ndrT4ChuWza5jklqq2LdgzkJByP7tPBGmih3Y1v7X824l1dGQSDYc7oA4JQd-XPfdamymWz3jh381Y-CLUKDai5tel26x6KsPT7DyiVwIRNwOLZKrmTr001G0SumhpaCufOEZ0bx47_521L0H3YCjWmVN7NECZihxo8tQyy7qifhF3efxBZXWA96pYgIvZ6kUT8xrPR8Q-JRz5USott2a"/>
            </div>
        </div>
    </header>

    <main class="pt-20 pb-24 px-4 max-w-5xl mx-auto">
        
        <!-- Header de Memoria -->
        <div class="flex flex-col mb-8">
            <h2 class="text-2xl font-bold tracking-tight mb-1">Historial</h2>
            <p class="text-on-surface-variant text-sm">Tareas completadas.</p>
        </div>

        <!-- History List (Dinámica) -->
        <div id="history-list" class="space-y-4">
            <!-- Las tareas completadas en tasks.html aparecerán acá -->
            <div id="empty-state" class="hidden py-20 flex flex-col items-center text-center gap-4 opacity-50">
                <span class="material-symbols-outlined text-6xl">history_edu</span>
                <p class="font-medium">Todavía no hay tareas completadas.<br>El oro de la experiencia se cocina en la acción.</p>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="clearHistory()" class="text-on-surface-variant text-xs hover:text-error transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">delete_sweep</span>
                Limpiar Memoria de Tareas
            </button>
        </div>
    </main>

    <!-- Modal para Gemini ✨ -->
    <div id="ai-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeAIModal()"></div>
        <div class="bg-surface-container border border-outline-variant w-full max-w-2xl rounded-2xl shadow-2xl relative flex flex-col max-h-[80vh]">
            <div class="p-6 border-b border-outline-variant flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">auto_awesome</span>
                    <h2 id="modal-title" class="text-xl font-bold tracking-tight">Análisis de Gemini</h2>
                </div>
                <button onclick="closeAIModal()" class="text-on-surface-variant hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="modal-content" class="p-6 overflow-y-auto text-on-surface-variant leading-relaxed font-geist whitespace-pre-wrap">
            </div>
            <div class="p-4 border-t border-outline-variant bg-surface-container-high flex justify-end gap-3">
                <button onclick="copyToClipboard()" class="px-4 py-2 text-sm font-bold text-primary hover:bg-primary/10 rounded-lg transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">content_copy</span>
                    Copiar
                </button>
                <button onclick="closeAIModal()" class="px-6 py-2 bg-outline-variant text-on-surface rounded-lg font-bold hover:brightness-110 transition-all">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant flex justify-around items-center h-16 pb-safe">
        <a class="flex flex-col items-center justify-center text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-geist text-[10px] font-medium">Dashboard</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant" href="tasks.html">
            <span class="material-symbols-outlined">assignment</span>
            <span class="font-geist text-[10px] font-medium">Tareas</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary font-bold" href="history.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
            <span class="font-geist text-[10px]">Historial</span>
        </a>
    </nav>

    <script>
        const apiKey = "";
        
        function loadHistory() {
            const historyList = document.getElementById('history-list');
            const emptyState = document.getElementById('empty-state');
            
            // Leemos la misma cajita que usa tasks.html
            const tasks = JSON.parse(localStorage.getItem('pastoral-tasks')) || [];
            
            // Filtramos solo las que están marcadas como completadas
            const completedTasks = tasks.filter(t => t.completed);
            
            if (completedTasks.length === 0) {
                emptyState.classList.remove('hidden');
                // Limpiamos los anteriores si los hubiera
                const cards = historyList.querySelectorAll('.task-card');
                cards.forEach(c => c.remove());
                return;
            }
            
            emptyState.classList.add('hidden');
            
            // Limpiar lista actual para no duplicar
            const currentCards = historyList.querySelectorAll('.task-card');
            currentCards.forEach(c => c.remove());

            completedTasks.forEach(task => {
                const card = document.createElement('div');
                card.className = "task-card bg-surface-container border border-outline-variant rounded-xl p-5 hover:bg-surface-container-high transition-colors group";
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-tertiary-container/30 text-tertiary text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">Logrado</span>
                                <span class="text-on-surface-variant text-xs">${task.priority || 'General'}</span>
                            </div>
                            <h3 class="task-title text-on-surface font-bold text-lg mb-1 group-hover:text-primary transition-colors">${task.title}</h3>
                            <p class="task-desc text-on-surface-variant text-sm leading-relaxed">Esta acción fue completada y está lista para ser analizada como parte de la Biblioteca Viva.</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-outline-variant flex items-center justify-between">
                        <span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Memoria Institucional</span>
                        <button onclick="generateCaseStudy(this)" class="px-3 py-1 bg-primary text-on-primary rounded-lg font-bold flex items-center gap-1 hover:brightness-110 active:scale-95 transition-all text-xs">
                            <span class="material-symbols-outlined text-sm">psychology</span>
                            Redactar Caso con IA ✨
                        </button>
                    </div>
                `;
                historyList.appendChild(card);
            });
        }

        async function callGemini(prompt, systemPrompt = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                }
            }
            throw new Error('No se pudo conectar con Gemini.');
        }

        async function generateCaseStudy(btn) {
            const card = btn.closest('.task-card');
            const taskTitle = card.querySelector('.task-title').innerText;

            const modal = document.getElementById('ai-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            title.innerText = `Sistematizando: ${taskTitle} ✨`;
            content.innerHTML = '<div class="flex flex-col items-center py-10 gap-4"><span class="material-symbols-outlined text-5xl text-primary animate-spin">auto_awesome</span><p class="loading-ai">Extrayendo el oro de la experiencia...</p></div>';
            modal.classList.remove('hidden');

            const systemPrompt = "Sos un mentor experto en sistematizar experiencias pastorales y educativas. Tu objetivo es transformar una tarea cumplida en un breve relato con Criterio y Sentido.";
            const userPrompt = `Tarea: ${taskTitle}. Redactá un caso de estudio breve para la 'Biblioteca Viva'. Estructura: 1. El Emergente (por qué era necesario). 2. El Vínculo (cómo participó el equipo/comunidad). 3. El Refrán (una idea corta y potente que resuma el aprendizaje).`;

            try {
                const text = await callGemini(userPrompt, systemPrompt);
                content.innerText = text;
            } catch (err) {
                content.innerHTML = `<p class="text-error font-bold">Error: ${err.message}</p>`;
            }
        }

        function clearHistory() {
            // Esto solo limpia la memoria si querés empezar de cero
            localStorage.removeItem('pastoral-tasks');
            loadHistory();
        }

        function closeAIModal() {
            document.getElementById('ai-modal').classList.add('hidden');
        }

        function copyToClipboard() {
            const content = document.getElementById('modal-content').innerText;
            const el = document.createElement('textarea');
            el.value = content;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            btn.innerHTML = '<span class="material-symbols-outlined text-sm">check</span> Copiado';
            setTimeout(() => btn.innerHTML = '<span class="material-symbols-outlined text-sm">content_copy</span> Copiar', 2000);
        }

        // Cargar al iniciar
        loadHistory();
    </script>
</body>
</html>
